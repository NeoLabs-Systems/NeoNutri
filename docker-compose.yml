services:
  app:
    build: .
    container_name: neonutri
    restart: unless-stopped
    ports:
      - "${PORT:-3050}:3050"
      - "${MCP_PORT:-3051}:3051"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3050
      - MCP_API_KEY=${MCP_API_KEY}
      - MCP_PORT=3051
    volumes:
      # Persist the SQLite database
      - neonutri_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3050/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  neonutri_data:
    driver: local
